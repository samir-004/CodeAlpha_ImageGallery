<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">SAMIR<span>VISUAL</span></div>

    <ul class="nav-links">
        <li>Work</li>
        <li>Gallery</li>
        <li>About</li>
        <li>Contact</li>
    </ul>

    <div class="nav-right">
        <button>Hire Me</button>
    </div>
</nav>

<!-- HERO -->
<header class="hero">
    <h1>VISUAL ARCHIVE</h1>
    <p>Selected works from design, architecture & motion studies</p>
</header>

<!-- FILTERS -->
<div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('architecture')">Architecture</button>
    <button onclick="filterImages('abstract')">Abstract</button>
</div>

<!-- GALLERY -->
<section class="gallery" id="gallery"></section>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeImage()">
    <span class="nav left" onclick="event.stopPropagation(); prevImage()">❮</span>

    <img id="lightbox-img">

    <span class="nav right" onclick="event.stopPropagation(); nextImage()">❯</span>
</div>

<script src="script.js"></script>

</body>
</html>
